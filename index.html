<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>

  <!-- 🎨 STYLE (CSS) GOES HERE -->
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    h1 {
      color: #4dd0e1;
      font-size: 40px;
    }

    p {
      font-size: 20px;
      color: #cccccc;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #4dd0e1;
      cursor: pointer;
    }

    button:hover {
      background: #26a69a;
    }
  </style>
</head>

<body>
  <h1>Hello!</h1>
  <p>This is my first styled website 😄</p>

  <button onclick="alert('You clicked me!')">
    Click me
  </button>
</body>
</html>
